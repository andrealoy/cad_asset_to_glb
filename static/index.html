<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>STEP → GLB</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: #0f0f13;
      color: #e2e2e8;
      font-family: system-ui, -apple-system, sans-serif;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.8rem 1.25rem;
      border-bottom: 1px solid #1e1e2e;
      flex-shrink: 0;
    }
    header h1 { font-size: 0.95rem; font-weight: 600; letter-spacing: 0.06em; flex-shrink: 0; }
    header h1 span { color: #818cf8; }

    #file-info {
      flex: 1;
      font-size: 0.8rem;
      color: #6b6b90;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }
    #file-info .name { color: #c7c7e0; font-weight: 500; }

    .hbtn {
      padding: 0.4rem 0.9rem;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      display: none;
      flex-shrink: 0;
      transition: background 0.15s;
      text-decoration: none;
    }
    #new-btn       { background: transparent; color: #6b6b90; border: 1px solid #2e2e48; }
    #new-btn:hover { color: #c7c7e0; border-color: #5f5f80; }
    #convert-btn   { background: #4f46e5; color: #fff; }
    #convert-btn:hover { background: #6366f1; }
    #convert-btn:disabled { background: #2e2e48; color: #5f5f80; cursor: default; }
    #download-btn { background: #059669; color: #fff; }
    #download-btn:hover { background: #10b981; }
    #wire-btn     { background: transparent; color: #6b6b90; border: 1px solid #2e2e48; }
    #wire-btn:hover { color: #c7c7e0; border-color: #5f5f80; }
    #wire-btn.active { color: #818cf8; border-color: #818cf8; }
    #ai-btn       { background: linear-gradient(135deg,#7c3aed,#a855f7); color: #fff; margin-left: auto; }
    #ai-btn:hover { background: linear-gradient(135deg,#6d28d9,#9333ea); }
    #ai-btn:disabled { background: #2e2e48; color: #5f5f80; cursor: default; }

    /* Capture overlay */
    #capture-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.7);
      display: none; flex-direction: column;
      align-items: center; justify-content: center; gap: 1rem;
      z-index: 100;
    }
    #capture-overlay.visible { display: flex; }
    #capture-overlay p    { font-size: 0.9rem; color: #c7c7e0; }
    #capture-overlay small { font-size: 0.75rem; color: #5f5f80; }
    #capture-progress { font-size: 0.8rem; color: #818cf8; }


    /* ── Main ── */
    main { flex: 1; position: relative; overflow: hidden; }

    /* ── Drop zone ── */
    #drop-zone {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 0.6rem; cursor: pointer;
    }
    #drop-zone.drag-over { background: #13131c; }
    #drop-zone.hidden { display: none; }

    .drop-ring {
      width: 148px; height: 148px;
      border: 2px dashed #2e2e48; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 0.4rem;
      transition: border-color 0.2s, transform 0.2s;
    }
    #drop-zone.drag-over .drop-ring { border-color: #818cf8; transform: scale(1.06); }
    .drop-ring svg { width: 50px; height: 50px; color: #3f3f62; transition: color 0.2s; }
    #drop-zone.drag-over .drop-ring svg { color: #818cf8; }

    #drop-zone strong { font-size: 0.95rem; color: #c7c7e0; }
    #drop-zone p { font-size: 0.8rem; color: #6b6b90; }
    #file-input { display: none; }

    /* ── Loading ── */
    #loading {
      position: absolute; inset: 0;
      display: none; flex-direction: column;
      align-items: center; justify-content: center; gap: 1rem;
    }
    #loading.visible { display: flex; }

    .spinner {
      width: 44px; height: 44px;
      border: 3px solid #2e2e48; border-top-color: #818cf8;
      border-radius: 50%; animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #loading-msg { font-size: 0.85rem; color: #6b6b90; }

    /* ── Viewer ── */
    #viewer { position: absolute; inset: 0; display: none; }
    #viewer.visible { display: block; }
    #viewer canvas { display: block; width: 100% !important; height: 100% !important; }

    #hint {
      position: absolute; bottom: 0.9rem; left: 50%; transform: translateX(-50%);
      font-size: 0.72rem; color: #2e2e48; pointer-events: none; white-space: nowrap;
    }

    #polycount {
      position: absolute; top: 0.6rem; right: 0.8rem;
      font-size: 0.75rem; color: #818cf8; background: rgba(15,15,19,.85);
      padding: 0.25rem 0.6rem; border-radius: 6px; border: 1px solid #2e2e48;
      pointer-events: none; display: none; font-variant-numeric: tabular-nums;
    }

    .msg-error { font-size: 0.8rem; color: #f87171; }
  </style>

  <script type="importmap">
  {
    "imports": {
      "three":          "https://cdn.jsdelivr.net/npm/three@0.176.0/build/three.module.js",
      "three/addons/":  "https://cdn.jsdelivr.net/npm/three@0.176.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>

<header>
  <h1>STEP <span>→</span> GLB</h1>
  <div id="file-info"></div>
  <button  id="new-btn"      class="hbtn">← Nouveau</button>
  <button  id="convert-btn"  class="hbtn">Convertir en GLB</button>
  <a       id="download-btn" class="hbtn">Télécharger le GLB</a>
  <button  id="wire-btn"     class="hbtn">◇ Wireframe</button>
  <button  id="ai-btn"       class="hbtn">✦ AI Enhance</button>
</header>

<main>
  <div id="drop-zone" role="button" tabindex="0">
    <div class="drop-ring">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
          d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/>
      </svg>
    </div>
    <strong>Déposez un fichier STEP ici</strong>
    <p>ou cliquez pour parcourir</p>
    <p style="margin-top:.3rem;color:#3a3a58;font-size:.75rem;">.step · .stp</p>
    <input type="file" id="file-input" accept=".step,.stp" />
  </div>

  <div id="loading">
    <div class="spinner"></div>
    <p id="loading-msg">Conversion en cours…</p>
  </div>

  <div id="viewer">
    <div id="hint">Orbite · Molette zoom · Clic droit pan</div>
    <div id="polycount"></div>
  </div>
</main>

<div id="capture-overlay">
  <div class="spinner"></div>
  <p>Capture des vues en cours…</p>
  <span id="capture-progress"></span>
  <small>Ne pas bouger la fenêtre</small>
</div>



<script type="module">
import * as THREE        from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader }    from 'three/addons/loaders/GLTFLoader.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

// DOM
const dropZone   = document.getElementById('drop-zone');
const fileInput  = document.getElementById('file-input');
const loadingEl  = document.getElementById('loading');
const loadingMsg = document.getElementById('loading-msg');
const viewerEl   = document.getElementById('viewer');
const fileInfo   = document.getElementById('file-info');
const newBtn     = document.getElementById('new-btn');
const convertBtn = document.getElementById('convert-btn');
const dlBtn      = document.getElementById('download-btn');
const aiBtn      = document.getElementById('ai-btn');
const wireBtn    = document.getElementById('wire-btn');
const polycountEl = document.getElementById('polycount');
let wireframeOn  = false;
const captureOverlay  = document.getElementById('capture-overlay');
const captureProgress = document.getElementById('capture-progress');


async function generate3d() {
  captureProgress.textContent = 'Génération du modèle 3D…';
  captureOverlay.querySelector('p').textContent = 'Génération 3D en cours…';
  captureOverlay.classList.add('visible');

  try {
    const res = await fetch('/generate-3d', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ stem: currentStem }),
    });
    const data = await res.json();

    captureOverlay.classList.remove('visible');
    captureOverlay.querySelector('p').textContent = 'Capture des vues en cours…';

    if (!res.ok) {
      showToast(`✗ hitem3d: ${data.error || 'Erreur'}`, true);
      return;
    }

    showToast('✓ Modèle 3D généré !');

    const localPath = data.local_path || '';
    const glbFile = localPath.split('hitem3d_output/')[1];
    if (glbFile) {
      loadGlb(`/hitem3d-glb/${glbFile}`, currentStem);
    }
  } catch (e) {
    captureOverlay.classList.remove('visible');
    captureOverlay.querySelector('p').textContent = 'Capture des vues en cours…';
    showToast(`✗ Erreur 3D : ${e.message}`, true);
  }
}

// Three.js setup
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.6;
viewerEl.prepend(renderer.domElement);

const scene    = new THREE.Scene();
scene.background = new THREE.Color(0x0f0f13);

// Environment map — required for PBR/metallic materials
const pmrem = new THREE.PMREMGenerator(renderer);
scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;
scene.environmentIntensity = 0.6;
pmrem.dispose();

const camera   = new THREE.PerspectiveCamera(45, 1, 0.001, 100000);
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;

// Diffuse fill — no shadows
scene.add(new THREE.AmbientLight(0xffffff, 0.3));
// Soft key light for shape/depth
const key = new THREE.DirectionalLight(0xfff4e0, 1.8);
key.position.set(4, 8, 5);
scene.add(key);
// Soft fill from opposite side
const fill = new THREE.DirectionalLight(0xd0dff5, 0.6);
fill.position.set(-4, 2, -5);
scene.add(fill);

const grid = new THREE.GridHelper(20, 40, 0x1e1e2e, 0x191926);
scene.add(grid);

new ResizeObserver(() => {
  const w = viewerEl.clientWidth, h = viewerEl.clientHeight;
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}).observe(viewerEl);

(function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
})();

// State
let currentFile   = null;
let currentGlbUrl = null;

// Drop / click
dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') fileInput.click(); });
dropZone.addEventListener('dragover',  e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', () => {
  if (fileInput.files[0]) handleFile(fileInput.files[0]);
});

newBtn.addEventListener('click', () => {
  currentFile = null;
  fileInput.value = '';
  fileInfo.innerHTML = '';
  [newBtn, convertBtn, dlBtn].forEach(b => b.style.display = 'none');
  if (currentGlbUrl) { URL.revokeObjectURL(currentGlbUrl); currentGlbUrl = null; }
  dlBtn.href = '';
  aiBtn.style.display = 'none';
  wireBtn.style.display = 'none';
  wireframeOn = false;
  wireBtn.classList.remove('active');
  clearModel();
  showDropZone();
});

convertBtn.addEventListener('click', () => {
  if (currentFile) sendToServer(currentFile);
});

// File selected → show header buttons
function handleFile(file) {
  const ext = file.name.split('.').pop().toLowerCase();
  if (!['step', 'stp'].includes(ext)) {
    fileInfo.innerHTML = '<span class="msg-error">Format invalide — .step ou .stp requis</span>';
    return;
  }
  currentFile = file;
  const stem = file.name.replace(/\.[^.]+$/, '');
  fileInfo.innerHTML = `<span class="name">${stem}</span>`;
  newBtn.style.display     = 'inline-block';
  convertBtn.style.display = 'inline-block';
  convertBtn.disabled      = false;
  convertBtn.textContent   = 'Convertir en GLB';
  dlBtn.style.display      = 'none';
}

// Server conversion → display GLB in viewer
async function sendToServer(file) {
  convertBtn.disabled    = true;
  convertBtn.textContent = 'Conversion…';
  showLoading('Conversion en cours…');

  const form = new FormData();
  form.append('file', file);

  let blob;
  try {
    const res = await fetch('/convert', { method: 'POST', body: form });
    if (!res.ok) {
      const { error } = await res.json().catch(() => ({ error: `HTTP ${res.status}` }));
      restoreAfterError(`✗ ${error}`);
      return;
    }
    blob = await res.blob();
  } catch {
    restoreAfterError('✗ Erreur réseau');
    return;
  }

  if (currentGlbUrl) URL.revokeObjectURL(currentGlbUrl);
  currentGlbUrl = URL.createObjectURL(blob);

  const stem = file.name.replace(/\.[^.]+$/, '');
  dlBtn.href            = currentGlbUrl;
  dlBtn.download        = `${stem}.glb`;
  dlBtn.style.display   = 'inline-block';
  convertBtn.style.display = 'none';

  loadGlb(currentGlbUrl, stem);
}

// current stem kept for capture filenames
let currentStem = 'model';

function loadGlb(url, stem = 'model') {
  currentStem = stem;
  showLoading('Chargement du modèle…');
  new GLTFLoader().load(url, gltf => {
    clearModel();
    const model = gltf.scene;
    model.userData.isModel = true;
    scene.add(model);
    fitCamera(model);
    updatePolycount(model);
    aiBtn.style.display = 'inline-block';
    aiBtn.disabled = false;
    wireBtn.style.display = 'inline-block';
    wireframeOn = false;
    wireBtn.classList.remove('active');
    showViewerPane();
  }, undefined, err => {
    restoreAfterError('✗ Erreur affichage GLB');
    console.error(err);
  });
}

function clearModel() {
  polycountEl.style.display = 'none';
  scene.children.filter(o => o.userData.isModel).forEach(o => {
    o.traverse(n => { if (n.isMesh) { n.geometry.dispose(); n.material.dispose(); } });
    scene.remove(o);
  });
}

function fitCamera(model) {
  const box    = new THREE.Box3().setFromObject(model);
  const center = box.getCenter(new THREE.Vector3());
  const size   = box.getSize(new THREE.Vector3());
  const maxDim = Math.max(size.x, size.y, size.z);
  model.position.sub(center);
  grid.position.y = -size.y / 2;
  const dist = (maxDim / 2) / Math.tan(camera.fov * Math.PI / 360) * 1.8;
  camera.position.set(dist * 0.7, dist * 0.5, dist);
  camera.near = maxDim * 0.0005;
  camera.far  = maxDim * 200;
  camera.updateProjectionMatrix();
  controls.target.set(0, 0, 0);
  controls.maxDistance = maxDim * 30;
  controls.update();
}

function restoreAfterError(msg) {
  showDropZone();
  fileInfo.innerHTML += ` <span class="msg-error">${msg}</span>`;
  if (currentFile) {
    convertBtn.disabled    = false;
    convertBtn.textContent = 'Convertir en GLB';
    convertBtn.style.display = 'inline-block';
    newBtn.style.display   = 'inline-block';
  }
}

function showDropZone() {
  dropZone.classList.remove('hidden');
  loadingEl.classList.remove('visible');
  viewerEl.classList.remove('visible');
}
function showLoading(msg) {
  loadingMsg.textContent = msg;
  dropZone.classList.add('hidden');
  loadingEl.classList.add('visible');
  viewerEl.classList.remove('visible');
}
function showViewerPane() {
  dropZone.classList.add('hidden');
  loadingEl.classList.remove('visible');
  viewerEl.classList.add('visible');
}

// ── Multi-view capture ────────────────────────────────────────────────────────
const CAPTURE_SIZE = 1024;

const VIEWS = [
  { name: 'quarter_left',  pos: (d) => new THREE.Vector3(-d, d * 0.6, d),    up: new THREE.Vector3(0,1,0) },
];

wireBtn.addEventListener('click', toggleWireframe);
aiBtn.addEventListener('click', captureViews);

function updatePolycount(model) {
  let tris = 0;
  model.traverse(n => {
    if (n.isMesh && n.geometry) {
      const geo = n.geometry;
      if (geo.index) tris += geo.index.count / 3;
      else if (geo.attributes.position) tris += geo.attributes.position.count / 3;
    }
  });
  tris = Math.round(tris);
  const fmt = tris >= 1_000_000 ? (tris / 1_000_000).toFixed(2) + 'M' : tris >= 1_000 ? (tris / 1_000).toFixed(1) + 'K' : tris;
  polycountEl.textContent = `▲ ${fmt} triangles`;
  polycountEl.style.display = 'block';
}

function toggleWireframe() {
  wireframeOn = !wireframeOn;
  wireBtn.classList.toggle('active', wireframeOn);
  const model = scene.children.find(o => o.userData.isModel);
  if (!model) return;

  if (wireframeOn) {
    // Collect meshes first to avoid mutating tree during traversal
    const meshes = [];
    model.traverse(n => { if (n.isMesh && !n.userData._isWireOverlay) meshes.push(n); });
    const wireMat = new THREE.MeshBasicMaterial({ color: 0xffffff, wireframe: true, transparent: true, opacity: 0.6 });
    meshes.forEach(n => {
      const wm = new THREE.Mesh(n.geometry, wireMat);
      wm.userData._isWireOverlay = true;
      wm.raycast = () => {};
      n.add(wm);
      n.userData._wireHelper = wm;
    });
  } else {
    // Remove wireframe overlays
    const toRemove = [];
    model.traverse(n => { if (n.userData._isWireOverlay) toRemove.push(n); });
    toRemove.forEach(wm => { wm.parent.userData._wireHelper = null; wm.parent.remove(wm); });
  }
}

async function captureViews() {
  const model = scene.children.find(o => o.userData.isModel);
  if (!model) return;

  aiBtn.disabled = true;
  captureOverlay.classList.add('visible');

  // Compute bounding sphere for camera distance
  const box     = new THREE.Box3().setFromObject(model);
  const sphere  = box.getBoundingSphere(new THREE.Sphere());
  const dist    = sphere.radius / Math.tan(camera.fov * Math.PI / 360) * 1.4;

  // Save current renderer size and camera state
  const origWidth  = renderer.domElement.width;
  const origHeight = renderer.domElement.height;
  const origAspect = camera.aspect;
  const origPos    = camera.position.clone();
  const origUp     = camera.up.clone();
  const origNear   = camera.near;
  const origFar    = camera.far;

  // Resize renderer to square capture size
  renderer.setSize(CAPTURE_SIZE, CAPTURE_SIZE, false);
  camera.aspect = 1;
  camera.near   = sphere.radius * 0.001;
  camera.far    = dist * 10;

  // Override all materials with flat grey for capture
  const savedMaterials = new Map();
  const greyMat = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, roughness: 0.8, metalness: 0.0, envMapIntensity: 0 });
  model.traverse(n => {
    if (n.isMesh) {
      savedMaterials.set(n, n.material);
      n.material = greyMat;
    }
  });
  // Temporarily remove environment map for capture
  const savedEnv = scene.environment;
  scene.environment = null;

  const images = {};

  for (let i = 0; i < VIEWS.length; i++) {
    const view = VIEWS[i];
    captureProgress.textContent = `${view.name.replace('_',' ')} (${i + 1}/${VIEWS.length})`;

    camera.position.copy(view.pos(dist));
    camera.up.copy(view.up);
    camera.lookAt(0, 0, 0);
    camera.updateProjectionMatrix();

    renderer.render(scene, camera);
    images[view.name] = renderer.domElement.toDataURL('image/png').split(',')[1];

    // yield to keep UI alive between renders
    await new Promise(r => requestAnimationFrame(r));
  }

  // Restore original materials
  model.traverse(n => {
    if (n.isMesh && savedMaterials.has(n)) n.material = savedMaterials.get(n);
  });
  greyMat.dispose();
  scene.environment = savedEnv;

  // Restore renderer and camera
  renderer.setSize(origWidth, origHeight, false);
  camera.aspect = origAspect;
  camera.near   = origNear;
  camera.far    = origFar;
  camera.position.copy(origPos);
  camera.up.copy(origUp);
  camera.updateProjectionMatrix();
  controls.update();

  captureProgress.textContent = 'Envoi au serveur…';

  try {
    const res = await fetch('/save-views', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ stem: currentStem, images }),
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const { saved } = await res.json();
    captureOverlay.classList.remove('visible');
    showToast(`✓ Capture sauvegardée`);
    // Launch 3D generation directly
    await generate3d();
  } catch (e) {
    captureOverlay.classList.remove('visible');
    showToast(`✗ Erreur sauvegarde : ${e.message}`, true);
  }

  aiBtn.disabled = false;
}

function showToast(msg, isError = false) {
  const t = document.createElement('div');
  t.textContent = msg;
  Object.assign(t.style, {
    position: 'fixed', bottom: '1.5rem', left: '50%', transform: 'translateX(-50%)',
    background: isError ? '#7f1d1d' : '#1e3a2f',
    color: isError ? '#fca5a5' : '#6ee7b7',
    padding: '0.5rem 1.2rem', borderRadius: '8px',
    fontSize: '0.82rem', zIndex: '200',
    boxShadow: '0 4px 16px rgba(0,0,0,.5)',
    transition: 'opacity 0.4s',
  });
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 400); }, 3000);
}
</script>
</body>
</html>
